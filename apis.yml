aid: mukuru
name: Mukuru
description: >-
  Mukuru is a Cape Town-headquartered, pan-African fintech and one of the
  continent's largest formal remittance providers, serving over 16 million
  customers across Southern, Eastern and Western Africa, the United Kingdom,
  and the European Union. Founded in 2004 to make sending money home faster
  and more affordable for the African diaspora, Mukuru now operates a broader
  financial services platform spanning international and domestic money
  transfers, the Mukuru Card (a prepaid card product), Mukuru Wallet (a
  mobile money wallet available in markets such as Botswana for airtime,
  electricity, and bill payments), Mukuru Pay (cash-based online checkout at
  retail partners), and Mukuru Funeral Cover (life insurance with
  cross-border repatriation benefits underwritten by Guardrisk Life). The
  company is licensed as a South African Financial Services Provider (FSP
  45517) and registered Credit Provider (NCRCP9244), and reaches customers
  through a hybrid network of branches, retail booths, USSD, WhatsApp, web,
  and native Android, iOS, and Huawei AppGallery apps, supported by more
  than 320,000 pay-in and pay-out locations. An enterprise arm — branded
  under the Mukuru Enterprise / MukuruPay umbrella — offers collections and
  disbursements rails to businesses sending funds into or paying out across
  Africa. Mukuru does not publish a public developer API, OpenAPI
  specification, SDK, or open-source client; its Mukuru GitHub organization
  contains only archived forks of upstream infrastructure tooling (Drone,
  Helm, Puppet, PHP Docker images) and no Mukuru-authored libraries.
  Integrations with the Mukuru Enterprise platform are arranged through
  direct commercial engagement rather than a self-service developer program.
